<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sirdique Profile</title>
    <!-- FontAwesome don alamomin social media (Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Sabon tsarin Background mai motsi da canza launuka */
        body {
            background: linear-gradient(-45deg, #0f0f1a, #1a1a3a, #0a1128, #161124);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite; /* Motsin background */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Code din dake sanya background din motsi */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .profile-card {
            background: rgba(26, 26, 46, 0.85); /* Dan dishi-dishi don a ga background ta baya */
            backdrop-filter: blur(10px); /* Glassmorphism effect */
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(42, 42, 74, 0.6);
        }

        /* Gyaran hoton profile (Zoom In da Cropping) */
        .profile-img-container {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            margin: 0 auto 20px;
            overflow: hidden;
            border: 4px solid #00d2ff;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
        }

        .profile-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.18);
            transition: transform 0.3s ease;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 5px;
            color: #00d2ff;
        }

        .username {
            font-size: 14px;
            color: #8b8baf;
            margin-bottom: 20px;
        }

        /* Sashen Services */
        .services-box {
            background: rgba(22, 22, 38, 0.7);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
            border: 1px solid rgba(34, 34, 59, 0.5);
            text-align: left;
        }

        .services-box h3 {
            font-size: 16px;
            color: #00d2ff;
            margin-bottom: 10px;
            text-align: center;
            border-bottom: 1px solid #2a2a4a;
            padding-bottom: 5px;
        }

        .service-item {
            font-size: 14px;
            margin: 8px 0;
            color: #d1d1e0;
        }

        .section-box {
            margin-top: 10px;
        }

        .section-title {
            font-size: 18px;
            margin-bottom: 15px;
            color: #ffffff;
        }

        /* Tsarin Maballan Social Media da Email */
        .social-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            color: #ffffff;
            font-weight: 600;
            font-size: 15px;
            transition: transform 0.2s, filter 0.2s;
        }

        .social-btn:active {
            transform: scale(0.98);
        }

        /* Launuka na musamman don kowane maballi */
        .btn-whatsapp { background: #25D366; }
        .btn-phone { background: #007bb5; }
        .btn-facebook { background: #1877F2; }
        .btn-tiktok { background: #000000; border: 1px solid #222; }
        .btn-instagram { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .btn-email { background: #ea4335; }

        /* Tsarin Animation da Launi na Copyright text */
        .copyright-text {
            font-size: 13px;
            color: #8b8baf;
            margin-top: 30px;
            text-align: center;
            font-weight: 500;
            animation: floatAnimation 3s ease-in-out infinite;
        }

        .copyright-text .highlight-name {
            background: linear-gradient(45deg, #ffd700, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Motsi na shawagi na rubutun kasa */
        @keyframes floatAnimation {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }

    </style>
</head>
<body>

    <div class="profile-card">
        <!-- Hoton Profile tare da Zoom In -->
        <div class="profile-img-container">
            <img src="https://github.com/Sirdique0.png" alt="Abubakar Profile">
        </div>

        <h1>Abubakar Abdullahi</h1>
        <div class="username">@Sirdique0</div>

        <!-- Sashen Abubuwan da Kake Yi (Services) -->
        <div class="services-box">
            <h3>My Services</h3>
            <div class="service-item">🎬 Video Editing</div>
            <div class="service-item">🤖 AI Image Generation</div>
            <div class="service-item">💌 Invitation Cards</div>
            <div class="service-item">📄 Flyers Design</div>
            <div class="service-item">📢 Banners Design</div>
            <div class="service-item">🎨 Graphic Design</div>
            <div class="service-item">🌐 Website Development</div>
        </div>

        <!-- Sashen Maballan Sadarwa (Contact Buttons) -->
        <div class="section-box" id="contact">
            <h2 class="section-title">Connect With Me</h2>
            <div class="social-container">
                <a href="https://wa.me/2349165132561" class="social-btn btn-whatsapp"><i class="fab fa-whatsapp"></i> WhatsApp</a>
                <a href="tel:+2349165132561" class="social-btn btn-phone"><i class="fas fa-phone-alt"></i> Call Me</a>
                <a href="https://www.facebook.com/share/18E6G9yYAn/" class="social-btn btn-facebook"><i class="fab fa-facebook-f"></i> Facebook</a>
                <a href="https://www.tiktok.com/@Place" class="social-btn btn-tiktok"><i class="fab fa-tiktok"></i> TikTok</a>
                <a href="https://www.instagram.com/sirdique_/" class="social-btn btn-instagram"><i class="fab fa-instagram"></i> Instagram</a>
                <!-- Maballin Email -->
                <a href="mailto:Abubakarsadeeq8533@gmail.com" class="social-btn btn-email"><i class="fas fa-envelope"></i> Email Me</a>
            </div>
        </div>

        <!-- Sabon rubutun Copyright mai motsi da launuka -->
        <div class="copyright-text">
            &copy; 2026 <span class="highlight-name">SIRDIQUE0</span>. All Rights Reserved.
        </div>
    </div>

</body>
</html>
